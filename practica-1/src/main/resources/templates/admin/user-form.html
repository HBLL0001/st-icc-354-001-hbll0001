<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::section})}">
<body>
<section th:fragment="content">

<div class="d-flex align-items-center mb-4 gap-3">
    <a th:href="@{/admin/users}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left me-1"></i><span th:text="#{btn.back}">Back</span>
    </a>
    <h2 class="mb-0 fw-semibold" th:text="#{admin.user.create}">Create User</h2>
</div>

<div class="card">
<div class="card-body p-4">
    <form th:action="@{/admin/users/new}" method="post">
        <div class="mb-3">
            <label class="form-label" th:text="#{admin.users.username}">Username</label>
            <input type="text" name="username" class="form-control" required autofocus/>
        </div>
        <div class="mb-3">
            <label class="form-label" th:text="#{admin.user.password}">Password</label>
            <input type="password" name="password" class="form-control" required/>
        </div>
        <div class="mb-4">
            <label class="form-label" th:text="#{admin.users.role}">Role</label>
            <select name="role" class="form-select">
                <option th:each="r : ${roles}" th:value="${r.name()}" th:text="${r.name()}">ROLE_USER</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary" th:text="#{admin.user.create}">Create User</button>
    </form>
</div>
</div>
</section>
</body>
</html>
