<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(content)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="#{app.title}">MockupAPI Server</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        :root {
            --bg: #0f111a; --surface: #161929; --surface2: #1e2235;
            --accent: #6c63ff; --accent2: #ff6584;
            --text: #e2e8f0; --muted: #7a869a; --border: #2d3252;
            --success-bg: #1a4731; --success-fg: #48bb78;
            --danger-bg: #4a1a1a; --danger-fg: #fc8181;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }
        /* Navbar */
        .navbar { background: var(--surface) !important; border-bottom: 1px solid var(--border); }
        .navbar-brand { color: var(--accent) !important; font-weight: 700; font-size: 1.3rem; }
        .nav-link { color: var(--muted) !important; transition: color .2s; }
        .nav-link:hover { color: var(--text) !important; }
        /* Cards */
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; }
        .card-header { background: var(--surface2); border-bottom: 1px solid var(--border); }
        /* Tables */
        .table { color: var(--text); }
        .table thead th { color: var(--muted); border-color: var(--border); font-size: .78rem; text-transform: uppercase; letter-spacing: .06em; }
        .table td, .table th { border-color: var(--border); vertical-align: middle; }
        .table tbody tr:hover { background: var(--surface2); }
        /* Buttons */
        .btn-primary { background: var(--accent); border-color: var(--accent); }
        .btn-primary:hover { background: #5a52e0; border-color: #5a52e0; }
        .btn-outline-secondary { border-color: var(--border); color: var(--muted); }
        .btn-outline-secondary:hover { background: var(--surface2); color: var(--text); border-color: var(--border); }
        /* Forms */
        .form-control, .form-select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
        .form-control:focus, .form-select:focus { background: var(--surface2); color: var(--text); border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,99,255,.15); }
        .form-control::placeholder { color: var(--muted); }
        .form-label { color: var(--muted); font-size: .85rem; font-weight: 500; }
        .form-check-input:checked { background-color: var(--accent); border-color: var(--accent); }
        .input-group-text { background: var(--surface2); border-color: var(--border); color: var(--muted); }
        /* Method badges */
        .badge-method { font-size: .7rem; padding: .3em .7em; border-radius: 6px; font-weight: 600; display:inline-block; }
        .badge-GET { background: #1a4731; color: #48bb78; }
        .badge-POST { background: #1a3a4f; color: #63b3ed; }
        .badge-PUT { background: #4a3800; color: #f6c90e; }
        .badge-PATCH { background: #3d2263; color: #b794f4; }
        .badge-DELETE { background: #4a1a1a; color: #fc8181; }
        .badge-OPTIONS { background: #2d3252; color: #a0aec0; }
        /* Alerts */
        .flash-success { background: var(--success-bg); color: var(--success-fg); border: 1px solid #2d6a4f; border-radius: 8px; padding: .75rem 1rem; margin-bottom: 1rem; }
        .flash-error { background: var(--danger-bg); color: var(--danger-fg); border: 1px solid #822; border-radius: 8px; padding: .75rem 1rem; margin-bottom: 1rem; }
        /* Lang switch */
        .lang-switch a { font-size: .75rem; color: var(--muted); text-decoration: none; margin: 0 .2rem; }
        .lang-switch a:hover { color: var(--accent); }
    </style>
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/projects}">
            <i class="bi bi-lightning-charge-fill me-1"></i>
            <span th:text="#{nav.brand}">MockupAPI</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMain">
            <ul class="navbar-nav me-auto" sec:authorize="isAuthenticated()">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/projects}">
                        <i class="bi bi-folder2 me-1"></i><span th:text="#{nav.projects}">Projects</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/mocks}">
                        <i class="bi bi-plug me-1"></i><span th:text="#{nav.mocks}">Mocks</span>
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/users}">
                        <i class="bi bi-people me-1"></i><span th:text="#{nav.admin}">Admin</span>
                    </a>
                </li>
            </ul>
            <div class="d-flex align-items-center gap-3">
                <div class="lang-switch">
                    <a th:href="@{''(lang=en)}">EN</a> |
                    <a th:href="@{''(lang=es)}">ES</a>
                </div>
                <form th:action="@{/logout}" method="post" class="mb-0" sec:authorize="isAuthenticated()">
                    <button type="submit" class="btn btn-sm btn-outline-secondary">
                        <i class="bi bi-box-arrow-right me-1"></i>
                        <span th:text="#{nav.logout}">Logout</span>
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="container pb-5">
    <!-- Flash messages -->
    <div th:if="${success}" class="flash-success">
        <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="flash-error">
        <i class="bi bi-exclamation-circle me-2"></i><span th:text="${error}"></span>
    </div>
    <!-- Page content -->
    <div th:replace="${content}">Page content here</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
