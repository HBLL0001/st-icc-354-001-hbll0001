# ─────────────────────────────────────────────────
# Spring profile: docker (PostgreSQL via env vars)
# ─────────────────────────────────────────────────
# All values overridden by Docker Compose env vars.

spring.application.name=MockupAPIServer

# PostgreSQL datasource (values injected by Docker Compose)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mockdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:mockuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:mockpass123}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

# Disable H2 console in Docker
spring.h2.console.enabled=false

# Thymeleaf
spring.thymeleaf.cache=true

# i18n
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# JWT
jwt.secret=${JWT_SECRET:bW9ja3VwLWFwaS1zZXJ2ZXItc2VjcmV0LWtleS0yNTZiaXRzLWxvbmcx}

# Server
server.port=8080
