<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::section})}">
<body>
<section th:fragment="content">

<div class="d-flex align-items-center mb-4 gap-3">
    <a th:href="@{/mocks}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left me-1"></i><span th:text="#{btn.back}">Back</span>
    </a>
    <h2 class="mb-0 fw-semibold">JWT Token</h2>
</div>

<div class="card">
<div class="card-body p-4">
    <p style="color:var(--muted)">
        Endpoint: <code th:text="${endpoint.method.name() + ' /api' + endpoint.path}"></code>
    </p>
    <p style="color:var(--muted)">
        Expires: <strong th:text="${#temporals.format(endpoint.expiresAt,'yyyy-MM-dd HH:mm')}"></strong>
    </p>
    <label class="form-label">Bearer Token</label>
    <div class="input-group mb-3">
        <input type="text" id="tokenInput" class="form-control"
               th:value="${token}" readonly
               style="font-family:monospace;font-size:.8rem"/>
        <button class="btn btn-outline-secondary" type="button" onclick="copyToken()">
            <i class="bi bi-clipboard"></i>
        </button>
    </div>
    <div class="p-3 rounded" style="background:var(--surface2)">
        <div class="small mb-1" style="color:var(--muted)">Usage:</div>
        <code style="font-size:.8rem">Authorization: Bearer &lt;token&gt;</code>
    </div>
</div>
</div>

<script>
function copyToken() {
    navigator.clipboard.writeText(document.getElementById('tokenInput').value)
        .then(() => alert('Token copied to clipboard!'));
}
</script>
</section>
</body>
</html>
